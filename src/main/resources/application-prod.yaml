spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}

server:
  port: 8080
  servlet:
    session:
      cookie:
        secure: true
        http-only: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

logging:
  level:
    root: WARN
    com.inventory: INFO
  file:
    name: /var/log/inventory/application.log
    max-size: 10MB
    max-history: 30