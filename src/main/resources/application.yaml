spring:
  application:
    name: inventory-order-management-system

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Santosh
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

# JWT Configuration
jwt:
  secret: your-super-secret-key-at-least-32-characters-long-for-hs512-algorithm
  expiration: 3600000  # 1 hour in milliseconds

# Logging Configuration
logging:
  level:
    root: INFO
    com.inventory: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/inventory-system.log

# Swagger/OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: true